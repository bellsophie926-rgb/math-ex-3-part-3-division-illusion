            &lt;h2 class=&quot;text-purple-400 font-bold text-sm uppercase tracking-wider mb-2&quot;&gt;Section Focus&lt;/h2&gt;
            &lt;p id=&quot;rule-text&quot; class=&quot;text-lg md:text-xl font-medium text-white leading-relaxed&quot;&gt;&lt;/p&gt;
        &lt;/div&gt;

        &lt;!-- Questions Container --&gt;
        &lt;div id=&quot;questions-container&quot; class=&quot;space-y-6&quot;&gt;
            &lt;!-- Questions injected by JS --&gt;
        &lt;/div&gt;

        &lt;!-- Results Section (Hidden initially) --&gt;
        &lt;div id=&quot;results-section&quot; class=&quot;hidden fade-in&quot;&gt;
            &lt;div class=&quot;bg-surface rounded-2xl border border-gray-700 p-8 text-center&quot;&gt;
                &lt;h2 class=&quot;text-3xl font-bold text-white mb-4&quot;&gt;Masterclass Complete! 🎉&lt;/h2&gt;
                &lt;div class=&quot;text-6xl font-bold text-purple-400 mb-2&quot; id=&quot;final-score&quot;&gt;0%&lt;/div&gt;
                &lt;p class=&quot;text-gray-400 mb-8&quot;&gt;Total Score&lt;/p&gt;
                
                &lt;div class=&quot;grid grid-cols-1 md:grid-cols-2 gap-6 text-left mb-8&quot;&gt;
                    &lt;div class=&quot;bg-dark p-4 rounded-xl border border-gray-700&quot;&gt;
                        &lt;div class=&quot;text-sm text-gray-400 mb-1&quot;&gt;Correct Answers&lt;/div&gt;
                        &lt;div class=&quot;text-2xl font-bold text-green-400&quot; id=&quot;correct-count&quot;&gt;0/20&lt;/div&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;bg-dark p-4 rounded-xl border border-gray-700&quot;&gt;
                        &lt;div class=&quot;text-sm text-gray-400 mb-1&quot;&gt;Mistakes&lt;/div&gt;
                        &lt;div class=&quot;text-2xl font-bold text-red-400&quot; id=&quot;mistake-count&quot;&gt;0&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;

                &lt;!-- Teacher Code Section --&gt;
                &lt;div class=&quot;border-t border-gray-700 pt-8&quot;&gt;
                    &lt;h3 class=&quot;text-lg font-bold text-purple-400 mb-4&quot;&gt;Submit to Teacher&lt;/h3&gt;
                    &lt;p class=&quot;text-gray-400 text-sm mb-4&quot;&gt;Copy this code and send it to your teacher:&lt;/p&gt;
                    &lt;div class=&quot;flex gap-2 max-w-md mx-auto&quot;&gt;
                        &lt;input type=&quot;text&quot; id=&quot;teacher-code&quot; readonly class=&quot;flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white font-mono text-sm&quot; value=&quot;Generating...&quot;&gt;
                        &lt;button onclick=&quot;copyCode()&quot; class=&quot;bg-purple-600 hover:bg-purple-500 text-white font-bold px-6 py-2 rounded-lg transition-colors&quot;&gt;Copy&lt;/button&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

    &lt;/main&gt;

    &lt;!-- Footer --&gt;
    &lt;footer class=&quot;border-t border-gray-800 mt-12 py-8 text-center text-gray-500 text-sm&quot;&gt;
        &lt;p&gt;Math Practice System &amp;copy; 2024&lt;/p&gt;
        &lt;button onclick=&quot;openPortal()&quot; class=&quot;mt-4 text-xs text-gray-600 hover:text-purple-400 transition-colors&quot;&gt;Teacher Login&lt;/button&gt;
    &lt;/footer&gt;

    &lt;!-- Teacher Portal Modal --&gt;
    &lt;div id=&quot;teacher-portal&quot; class=&quot;fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4&quot;&gt;
        &lt;div class=&quot;bg-surface rounded-2xl border border-gray-700 p-8 max-w-4xl w-full max-h-[90vh] overflow-y-auto&quot;&gt;
            &lt;div class=&quot;flex justify-between items-center mb-6&quot;&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-white flex items-center gap-2&quot;&gt;
                    &lt;span&gt;👨&zwj;🏫&lt;/span&gt; Teacher Portal
                &lt;/h2&gt;
                &lt;button onclick=&quot;closePortal()&quot; class=&quot;text-gray-400 hover:text-white text-2xl&quot;&gt;&amp;times;&lt;/button&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;mb-8&quot;&gt;
                &lt;label class=&quot;text-gray-400 text-sm mb-2 block&quot;&gt;Enter Student Code:&lt;/label&gt;
                &lt;div class=&quot;flex gap-2&quot;&gt;
                    &lt;input type=&quot;text&quot; id=&quot;portal-input&quot; class=&quot;flex-1 bg-dark border border-gray-600 rounded-lg px-4 py-2 text-white font-mono&quot; placeholder=&quot;Paste code here...&quot;&gt;
                    &lt;button onclick=&quot;decodeReport()&quot; class=&quot;bg-purple-600 hover:bg-purple-500 text-white font-bold px-6 py-2 rounded-lg transition-colors&quot;&gt;View Report&lt;/button&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;div id=&quot;portal-report&quot; class=&quot;hidden space-y-6&quot;&gt;
                &lt;!-- Report content injected here --&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;script&gt;
        // --- DATA ---
        const practiceData = [
            {
                id: &quot;secA&quot;,
                title: &quot;Sec A: Translator&quot;,
                rule: &quot;Translate division by decimals into multiplication. (e.g., &divide; 0.5 is the same as &times; 2)&quot;,
                questions: [
                    {
                        type: &quot;fill&quot;,
                        q: &quot;1. m &divide; 0.5 is exactly the same mathematical action as m &times; [A]&quot;,
                        inputs: [&quot;2&quot;],
                        expl: &quot;Correct! Because 2 halves make a whole.&quot;
                    },
                    {
                        type: &quot;fill&quot;,
                        q: &quot;2. y &divide; 0.1 is exactly the same mathematical action as y &times; [A]&quot;,
                        inputs: [&quot;10&quot;],
                        expl: &quot;Correct! Because 10 tenths make a whole.&quot;
                    },
                    {
                        type: &quot;fill&quot;,
                        q: &quot;3. k &divide; 0.25 is exactly the same mathematical action as k &times; [A]&quot;,
                        inputs: [&quot;4&quot;],
                        expl: &quot;Correct! Because 4 quarters make a whole.&quot;
                    },
                    {
                        type: &quot;fill&quot;,
                        q: &quot;4. w &divide; 0.2 is exactly the same mathematical action as w &times; [A]&quot;,
                        inputs: [&quot;5&quot;],
                        expl: &quot;Correct! Because 5 fifths make a whole.&quot;
                    }
                ]
            },
            {
                id: &quot;secB&quot;,
                title: &quot;Sec B: Illusion Busters&quot;,
                rule: &quot;Don't be fooled! Dividing by a number &lt; 1 makes the result LARGER.&quot;,
                questions: [
                    {
                        type: &quot;choice&quot;,
                        q: &quot;5. True or False: Dividing a number by 0.5 will always make the final answer smaller.&quot;,
                        options: [&quot;True&quot;, &quot;False&quot;],
                        ans: 1,
                        expl: &quot;False. It makes it 2 times bigger.&quot;
                    },
                    {
                        type: &quot;choice&quot;,
                        q: &quot;6. True or False: x &divide; 0.1 will give you a larger result than x &times; 5.&quot;,
                        options: [&quot;True&quot;, &quot;False&quot;],
                        ans: 0,
                        expl: &quot;True. x &divide; 0.1 is x &times; 10. And 10x is larger than 5x.&quot;
                    },
                    {
                        type: &quot;choice&quot;,
                        q: &quot;7. True or False: n &divide; 0.25 is the exact same as n &divide; 4.&quot;,
                        options: [&quot;True&quot;, &quot;False&quot;],
                        ans: 1,
                        expl: &quot;False. Dividing by 0.25 is multiplying by 4. Dividing by 4 makes it smaller.&quot;
                    },
                    {
                        type: &quot;choice&quot;,
                        q: &quot;8. True or False: p &times; 0.5 and p &divide; 2 will give you the exact same answer.&quot;,
                        options: [&quot;True&quot;, &quot;False&quot;],
                        ans: 0,
                        expl: &quot;True. Multiplying by a half is the exact same as cutting it in half.&quot;
                    }
                ]
            },
            {
                id: &quot;secC&quot;,
                title: &quot;Sec C: Head-to-Head&quot;,
                rule: &quot;Compare the expressions directly. Convert division to multiplication to see clearly.&quot;,
                questions: [
                    {
                        type: &quot;compare&quot;,
                        q: &quot;9. Compare: m &divide; 0.5 ___ m &times; 2&quot;,
                        options: [&quot;&lt;&quot;, &quot;&gt;&quot;, &quot;=&quot;],
                        ans: 2,
                        expl: &quot;Both mean doubling the number.&quot;
                    },
                    {
                        type: &quot;compare&quot;,
                        q: &quot;10. Compare: y &divide; 0.1 ___ y &times; 9&quot;,
                        options: [&quot;&lt;&quot;, &quot;&gt;&quot;, &quot;=&quot;],
                        ans: 1,
                        expl: &quot;y &divide; 0.1 is y &times; 10. And 10 &gt; 9.&quot;
                    },
                    {
                        type: &quot;compare&quot;,
                        q: &quot;11. Compare: k &divide; 0.2 ___ k &divide; 2&quot;,
                        options: [&quot;&lt;&quot;, &quot;&gt;&quot;, &quot;=&quot;],
                        ans: 1,
                        expl: &quot;k &divide; 0.2 is k &times; 5. k &divide; 2 is cutting in half. 5x is much greater.&quot;
                    },
                    {
                        type: &quot;compare&quot;,
                        q: &quot;12. Compare: w &divide; 0.25 ___ w &times; 4&quot;,
                        options: [&quot;&lt;&quot;, &quot;&gt;&quot;, &quot;=&quot;],
                        ans: 2,
                        expl: &quot;Both mean making the number 4 times bigger.&quot;
                    },
                    {
                        type: &quot;compare&quot;,
                        q: &quot;13. Compare: n &times; 0.5 ___ n &divide; 0.5&quot;,
                        options: [&quot;&lt;&quot;, &quot;&gt;&quot;, &quot;=&quot;],
                        ans: 0,
                        expl: &quot;The left side halves it; the right side doubles it.&quot;
                    },
                    {
                        type: &quot;reasoning&quot;,
                        q: &quot;🗣️ Reasoning Check for Q13&quot;,
                        text: &quot;I know the left side is making the number [A], but the right side means 'how many halves fit inside', which actually [B] the number.&quot;,
                        inputs: [&quot;smaller&quot;, &quot;doubles&quot;],
                        expl: &quot;Correct! Halving vs Doubling.&quot;
                    }
                ]
            },
            {
                id: &quot;secD&quot;,
                title: &quot;Sec D: Spot Extreme&quot;,
                rule: &quot;Identify which operation produces the largest or smallest change.&quot;,
                questions: [
                    {
                        type: &quot;choice&quot;,
                        q: &quot;14. Which expression gives the LARGEST result?&quot;,
                        options: [&quot;x &divide; 2&quot;, &quot;x &divide; 0.2&quot;, &quot;x &times; 2&quot;],
                        ans: 1,
                        expl: &quot;B multiplies by 5. A cuts in half. C doubles.&quot;
                    },
                    {
                        type: &quot;choice&quot;,
                        q: &quot;15. Which expression gives the SMALLEST result?&quot;,
                        options: [&quot;y &divide; 0.1&quot;, &quot;y &times; 0.1&quot;, &quot;y &times; 10&quot;],
                        ans: 1,
                        expl: &quot;B multiplies by 0.1 (1/10), making it smaller. A and C both multiply by 10.&quot;
                    },
                    {
                        type: &quot;choice&quot;,
                        q: &quot;16. Which of these is a perfect match for m &divide; 0.25?&quot;,
                        options: [&quot;m &divide; 4&quot;, &quot;m &times; 0.25&quot;, &quot;m &times; 4&quot;],
                        ans: 2,
                        expl: &quot;Asking how many quarters fit inside is the same as multiplying by 4.&quot;
                    }
                ]
            },
            {
                id: &quot;secE&quot;,
                title: &quot;Sec E: Order &amp; Logic&quot;,
                rule: &quot;Apply your translation skills to complex problems.&quot;,
                questions: [
                    {
                        type: &quot;order&quot;,
                        q: &quot;17. Order from SMALLEST to LARGEST:&quot;,
                        items: [&quot;h &divide; 0.5&quot;, &quot;h &divide; 2&quot;, &quot;h &divide; 0.1&quot;],
                        correctOrder: [&quot;h &divide; 2&quot;, &quot;h &divide; 0.5&quot;, &quot;h &divide; 0.1&quot;],
                        expl: &quot;h &divide; 2 (Half), h &divide; 0.5 (2x), h &divide; 0.1 (10x).&quot;
                    },
                    {
                        type: &quot;order&quot;,
                        q: &quot;18. Order from LARGEST to SMALLEST:&quot;,
                        items: [&quot;c &times; 5&quot;, &quot;c &divide; 0.25&quot;, &quot;c &divide; 0.5&quot;],
                        correctOrder: [&quot;c &times; 5&quot;, &quot;c &divide; 0.25&quot;, &quot;c &divide; 0.5&quot;],
                        expl: &quot;c &times; 5 (5x), c &divide; 0.25 (4x), c &divide; 0.5 (2x).&quot;
                    },
                    {
                        type: &quot;choice&quot;,
                        q: &quot;19. Spot the Mistake: Classmate says 'm &divide; 0.5 &gt; m &divide; 0.2 because 0.5 &gt; 0.2'. Is he correct?&quot;,
                        options: [&quot;Yes&quot;, &quot;No&quot;],
                        ans: 1,
                        expl: &quot;No. Dividing by 0.5 means multiplying by 2. Dividing by 0.2 means multiplying by 5. 0.2 slices are smaller, so more fit inside.&quot;
                    },
                    {
                        type: &quot;fill&quot;,
                        q: &quot;20. The Boss Puzzle: x &divide; 0.5 &divide; 0.1 is the same as multiplying x by [A].&quot;,
                        inputs: [&quot;20&quot;],
                        expl: &quot;Correct! First multiply by 2, then multiply by 10. 2 &times; 10 = 20.&quot;
                    }
                ]
            }
        ];

        let currentPartIndex = 0;
        let userAnswers = {}; // Store answers: { &quot;secA-0&quot;: { correct: true, val: 1, userVal: 1 } }

        // --- INIT ---
        function init() {
            renderTabs();
            loadPart(0);
        }

        function renderTabs() {
            const container = document.getElementById('nav-tabs');
            container.innerHTML = '';
            practiceData.forEach((part, index) =&gt; {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors ${index === currentPartIndex ? 'bg-purple-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`;
                btn.innerText = part.title;
                btn.onclick = () =&gt; loadPart(index);
                container.appendChild(btn);
            });
        }

        function loadPart(index) {
            currentPartIndex = index;
            renderTabs();
            
            // Update Back Button
            const btnPrev = document.getElementById('btn-prev');
            if(index &gt; 0) btnPrev.classList.remove('hidden');
            else btnPrev.classList.add('hidden');

            const part = practiceData[index];
            
            // Update Rule
            const ruleText = document.getElementById('rule-text');
            ruleText.style.opacity = 0;
            setTimeout(() =&gt; {
                ruleText.innerText = part.rule;
                anime({ targets: ruleText, opacity: [0, 1], translateY: [10, 0], duration: 500 });
            }, 200);

            // Render Questions
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            part.questions.forEach((q, qIdx) =&gt; {
                const qKey = `${part.id}-${qIdx}`;
                const saved = userAnswers[qKey];
                
                const card = document.createElement('div');
                card.className = &quot;bg-surface border border-gray-700 rounded-2xl p-6 card-hover fade-in&quot;;
                card.style.animationDelay = `${qIdx * 100}ms`;
                
                let content = `
                    &lt;div class=&quot;flex items-start gap-3 mb-4&quot;&gt;
                        &lt;div class=&quot;bg-purple-900/50 text-purple-400 w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm shrink-0&quot;&gt;${qIdx + 1}&lt;/div&gt;
                        &lt;div class=&quot;text-lg text-white font-medium&quot;&gt;${q.q.replace(/\[A\]/g, '___').replace(/\[B\]/g, '___')}&lt;/div&gt;
                    &lt;/div&gt;
                `;

                // Render Interaction
                content += `&lt;div id=&quot;interaction-${qIdx}&quot; class=&quot;ml-11&quot;&gt;`;
                
                if (q.type === 'choice' || q.type === 'compare') {
                    content += `&lt;div class=&quot;grid grid-cols-${q.options.length} gap-3&quot;&gt;`;
                    q.options.forEach((opt, optIdx) =&gt; {
                        let btnClass = &quot;opt-btn bg-dark border border-gray-600 hover:border-purple-500 p-3 rounded-xl text-gray-300 font-mono transition-all&quot;;
                        if(saved) {
                            btnClass += &quot; pointer-events-none opacity-50&quot;;
                            if(optIdx === q.ans) btnClass += &quot; bg-green-900/30 border-green-500 text-green-400 opacity-100&quot;;
                            if(saved.userVal === optIdx &amp;&amp; !saved.correct) btnClass += &quot; bg-red-900/30 border-red-500 text-red-400 opacity-100&quot;;
                        }
                        content += `&lt;button onclick=&quot;checkChoice(${qIdx}, ${optIdx})&quot; class=&quot;${btnClass}&quot;&gt;${opt}&lt;/button&gt;`;
                    });
                    content += `&lt;/div&gt;`;
                } else if (q.type === 'order') {
                    if(saved) {
                         content += `&lt;div class=&quot;text-gray-400 italic&quot;&gt;Answer submitted.&lt;/div&gt;`;
                    } else {
                        content += `
                            &lt;div class=&quot;bg-dark p-4 rounded-xl border border-gray-600 mb-3 min-h-[60px] flex flex-wrap gap-2&quot; id=&quot;drop-zone-${qIdx}&quot;&gt;&lt;/div&gt;
                            &lt;div class=&quot;flex flex-wrap gap-2&quot; id=&quot;source-zone-${qIdx}&quot;&gt;
                                ${q.items.map(item =&gt; `&lt;div onclick=&quot;moveItem(this, ${qIdx})&quot; class=&quot;bg-purple-900/30 border border-purple-500/50 px-3 py-1 rounded-lg cursor-pointer hover:bg-purple-800/50 text-purple-200&quot;&gt;${item}&lt;/div&gt;`).join('')}
                            &lt;/div&gt;
                            &lt;button onclick=&quot;checkOrder(${qIdx})&quot; class=&quot;mt-3 bg-purple-600 hover:bg-purple-500 text-white px-4 py-1 rounded-lg text-sm font-bold&quot;&gt;Check Order&lt;/button&gt;
                        `;
                    }
                } else if (q.type === 'fill' || q.type === 'reasoning') {
                    if(saved) {
                         content += `&lt;div class=&quot;text-gray-400 italic&quot;&gt;Answer submitted.&lt;/div&gt;`;
                    } else {
                        if(q.text) content += `&lt;p class=&quot;text-gray-400 mb-3 italic&quot;&gt;${q.text.replace(/\[A\]/g, '&lt;input type=&quot;text&quot; class=&quot;bg-dark border border-gray-600 rounded px-2 py-1 w-24 text-center text-white mx-1&quot; placeholder=&quot;?&quot;&gt;').replace(/\[B\]/g, '&lt;input type=&quot;text&quot; class=&quot;bg-dark border border-gray-600 rounded px-2 py-1 w-24 text-center text-white mx-1&quot; placeholder=&quot;?&quot;&gt;')}&lt;/p&gt;`;
                        else content += `&lt;div class=&quot;flex gap-2 mb-3&quot;&gt;${q.inputs.map(() =&gt; '&lt;input type=&quot;text&quot; class=&quot;bg-dark border border-gray-600 rounded px-2 py-1 w-32 text-center text-white&quot; placeholder=&quot;Answer&quot;&gt;').join('')}&lt;/div&gt;`;
                        content += `&lt;button onclick=&quot;checkFill(${qIdx})&quot; class=&quot;bg-purple-600 hover:bg-purple-500 text-white px-4 py-1 rounded-lg text-sm font-bold&quot;&gt;Check Answer&lt;/button&gt;`;
                    }
                }

                content += `&lt;/div&gt;`;
                
                // Feedback Area
                content += `&lt;div id=&quot;feedback-${qIdx}&quot; class=&quot;hidden ml-11 mt-4 p-4 rounded-xl bg-gray-800/50 border border-gray-700&quot;&gt;&lt;/div&gt;`;

                card.innerHTML = content;
                container.appendChild(card);

                // Restore Feedback if saved
                if(saved) {
                    const fb = card.querySelector(`#feedback-${qIdx}`);
                    showFeedback(fb, saved.correct, q.expl, false);
                }
            });

            // Check if all parts done to show results
            checkCompletion();
        }

        function prevPart() {
            if(currentPartIndex &gt; 0) loadPart(currentPartIndex - 1);
        }

        // --- CHECK LOGIC ---
        window.checkChoice = function(qIdx, optIdx) {
            const part = practiceData[currentPartIndex];
            const q = part.questions[qIdx];
            const qKey = `${part.id}-${qIdx}`;
            if(userAnswers[qKey]) return;

            const isCorrect = optIdx === q.ans;
            userAnswers[qKey] = { correct: isCorrect, val: q.ans, userVal: optIdx };

            loadPart(currentPartIndex); // Re-render to lock UI
        };

        window.moveItem = function(el, qIdx) {
            const drop = document.getElementById(`drop-zone-${qIdx}`);
            const source = document.getElementById(`source-zone-${qIdx}`);
            if(el.parentElement === source) drop.appendChild(el);
            else source.appendChild(el);
        };

        window.checkOrder = function(qIdx) {
            const part = practiceData[currentPartIndex];
            const q = part.questions[qIdx];
            const qKey = `${part.id}-${qIdx}`;
            if(userAnswers[qKey]) return;

            const drop = document.getElementById(`drop-zone-${qIdx}`);
            const userOrder = Array.from(drop.children).map(el =&gt; el.innerText);
            
            const isCorrect = JSON.stringify(userOrder) === JSON.stringify(q.correctOrder);
            userAnswers[qKey] = { correct: isCorrect, val: q.correctOrder, userVal: userOrder };
            
            loadPart(currentPartIndex);
        };

        window.checkFill = function(qIdx) {
            const part = practiceData[currentPartIndex];
            const q = part.questions[qIdx];
            const qKey = `${part.id}-${qIdx}`;
            if(userAnswers[qKey]) return;

            const inputs = document.querySelectorAll(`#interaction-${qIdx} input`);
            let allCorrect = true;
            let userVals = [];
            inputs.forEach((input, i) =&gt; {
                const val = input.value.trim().toLowerCase();
                userVals.push(val);
                if(!val.includes(q.inputs[i].toLowerCase()) &amp;&amp; val !== q.inputs[i]) allCorrect = false;
            });

            userAnswers[qKey] = { correct: allCorrect, val: q.inputs, userVal: userVals };
            loadPart(currentPartIndex);
        };

        function showFeedback(el, isCorrect, text, animate = true) {
            el.classList.remove('hidden');
            el.className = `ml-11 mt-4 p-4 rounded-xl border ${isCorrect ? 'bg-green-900/20 border-green-500/30' : 'bg-red-900/20 border-red-500/30'}`;
            el.innerHTML = `
                &lt;div class=&quot;flex items-start gap-3&quot;&gt;
                    &lt;div class=&quot;text-2xl&quot;&gt;${isCorrect ? '✅' : '❌'}&lt;/div&gt;
                    &lt;div&gt;
                        &lt;div class=&quot;font-bold ${isCorrect ? 'text-green-400' : 'text-red-400'} mb-1&quot;&gt;${isCorrect ? 'Correct!' : 'Incorrect'}&lt;/div&gt;
                        &lt;div class=&quot;text-gray-300 text-sm leading-relaxed&quot;&gt;${text}&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            `;
            if(animate) anime({ targets: el, opacity: [0, 1], translateY: [10, 0] });
        }

        function checkCompletion() {
            const totalQs = practiceData.reduce((acc, part) =&gt; acc + part.questions.length, 0);
            const answeredQs = Object.keys(userAnswers).length;
            
            if(answeredQs === totalQs) {
                document.getElementById('results-section').classList.remove('hidden');
                
                let correct = 0;
                Object.values(userAnswers).forEach(a =&gt; { if(a.correct) correct++; });
                
                const percentage = Math.round((correct / totalQs) * 100);
                document.getElementById('final-score').innerText = `${percentage}%`;
                document.getElementById('correct-count').innerText = `${correct}/${totalQs}`;
                document.getElementById('mistake-count').innerText = `${totalQs - correct}`;

                // Generate Code
                const report = {
                    score: percentage,
                    details: userAnswers
                };
                const code = 'DIV-' + btoa(JSON.stringify(report));
                document.getElementById('teacher-code').value = code;
            }
        }

        function copyCode() {
            const input = document.getElementById('teacher-code');
            input.select();
            document.execCommand('copy');
            alert('Code copied!');
        }

        // --- TEACHER PORTAL ---
        function openPortal() {
            document.getElementById('teacher-portal').classList.remove('hidden');
        }

        function closePortal() {
            document.getElementById('teacher-portal').classList.add('hidden');
        }

        function decodeReport() {
            const input = document.getElementById('portal-input').value.trim();
            if(!input.startsWith('DIV-')) {
                alert('Invalid code format');
                return;
            }

            try {
                const data = JSON.parse(atob(input.substring(4)));
                renderReport(data);
            } catch(e) {
                alert('Error decoding report');
            }
        }

        function renderReport(data) {
            const container = document.getElementById('portal-report');
            container.classList.remove('hidden');
            container.innerHTML = `
                &lt;div class=&quot;bg-dark p-4 rounded-xl border border-purple-500/30 text-center mb-6&quot;&gt;
                    &lt;div class=&quot;text-gray-400 text-sm&quot;&gt;Student Score&lt;/div&gt;
                    &lt;div class=&quot;text-3xl font-bold text-purple-400&quot;&gt;${data.score}%&lt;/div&gt;
                &lt;/div&gt;
                &lt;h3 class=&quot;font-bold text-white mb-4&quot;&gt;Detailed Report:&lt;/h3&gt;
                &lt;div class=&quot;space-y-3 max-h-[400px] overflow-y-auto pr-2&quot;&gt;
            `;

            let mistakesHtml = '';
            // Iterate through practiceData to maintain order
            practiceData.forEach(part =&gt; {
                part.questions.forEach((q, qIdx) =&gt; {
                    const qKey = `${part.id}-${qIdx}`;
                    const ans = data.details[qKey];
                    if(ans) {
                        const statusColor = ans.correct ? 'text-green-400' : 'text-red-400';
                        const statusIcon = ans.correct ? '✅' : '❌';
                        
                        mistakesHtml += `
                            &lt;div class=&quot;bg-gray-800 p-4 rounded-lg border border-gray-700&quot;&gt;
                                &lt;div class=&quot;flex justify-between mb-2&quot;&gt;
                                    &lt;span class=&quot;text-xs font-bold text-gray-500&quot;&gt;${part.title} - Q${qIdx + 1}&lt;/span&gt;
                                    &lt;span class=&quot;text-xs ${statusColor}&quot;&gt;${statusIcon} ${ans.correct ? 'Correct' : 'Incorrect'}&lt;/span&gt;
                                &lt;/div&gt;
                                &lt;p class=&quot;text-white text-sm mb-2&quot;&gt;${q.q}&lt;/p&gt;
                                &lt;div class=&quot;grid grid-cols-2 gap-2 text-xs&quot;&gt;
                                    &lt;div class=&quot;text-gray-400&quot;&gt;Student: &lt;span class=&quot;text-white&quot;&gt;${JSON.stringify(ans.userVal)}&lt;/span&gt;&lt;/div&gt;
                                    &lt;div class=&quot;text-gray-400&quot;&gt;Correct: &lt;span class=&quot;text-green-400&quot;&gt;${JSON.stringify(ans.val)}&lt;/span&gt;&lt;/div&gt;
                                &lt;/div&gt;
                            &lt;/div&gt;
                        `;
                    }
                });
            });
            
            container.innerHTML += mistakesHtml + '&lt;/div&gt;';
        }

        init();
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**

     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
